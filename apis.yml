  - type: Features
    data:
      - name: Grant Award Transparency
        description: >-
          USADF grant award data publicly accessible via USASpending.gov API,
          including recipient, country, amount, and award period for all USADF grants.
      - name: Grant Opportunity Listings
        description: >-
          USADF posts open grant solicitations on Grants.gov for African grassroots
          enterprises seeking funding up to $250,000.
      - name: Agency Spending Profile
        description: >-
          Comprehensive USADF spending data accessible through USASpending.gov
          including account data, award breakdowns, and budget authority.
      - name: Recipient Data
        description: >-
          Data on organizations receiving USADF grants across 24 African countries,
          including grant amounts, periods of performance, and program areas.
  - type: UseCases
    data:
      - name: Grant Transparency Research
        description: >-
          Researchers and journalists accessing USADF grant award data through
          USASpending API to analyze funding patterns across African countries.
      - name: Grant Opportunity Discovery
        description: >-
          African enterprises and NGOs finding and applying for USADF grant
          opportunities through Grants.gov listings.
      - name: Federal Spending Analysis
        description: >-
          Policy analysts tracking USADF budget authority, obligations, and outlays
          through USASpending federal account data.
      - name: Development Impact Tracking
        description: >-
          Development finance institutions and donors assessing USADF program
          reach and impact through award data and recipient profiles.
  - type: Integrations
    data:
      - name: USASpending.gov
        description: >-
          Federal awards transparency platform providing API access to all USADF
          grant awards, recipient data, and spending profiles.
      - name: Grants.gov
        description: >-
          Federal grant opportunity portal where USADF posts open solicitations
          for African grassroots enterprise grants.
      - name: SAM.gov
        description: >-
          System for Award Management where USADF grant recipients register
          to receive federal award funding.
      - name: FPDS-NG
        description: >-
          Federal Procurement Data System tracking USADF contract and interagency
          agreement spending.
      - name: USAID OIG
        description: >-
          USAID Office of Inspector General providing independent oversight of
          USADF grants administration and partnerships.
