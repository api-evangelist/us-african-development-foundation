modified: '2026-05-03'
position: Consumer
description: >-
  The US African Development Foundation (USADF) is an independent federal agency
  established by Congress in 1980 to invest directly in African grassroots enterprises
  and social entrepreneurs. USADF provides grant capital of up to $250,000, capacity-building
  assistance, and convening opportunities to develop, grow, and scale African enterprises
  and entrepreneurs. USADF grant data is publicly accessible via the USASpending.gov API,
  and grant opportunities are posted to Grants.gov. Between 2019 and 2023, USADF awarded
  more than $141 million in grants to over 1,050 community enterprises in Africa, directly
  affecting 6.2 million people.
specificationVersion: '0.19'
apis:
  - aid: us-african-development-foundation:grants-api
    name: USADF Grants Data API
    description: >-
      Access to USADF grant award data through the USASpending.gov API. Provides
      programmatic access to USADF grants, awards, recipients, and spending profiles
      as reported to the federal awards transparency system. USADF data is available
      via the USASpending API using the USADF agency identifier (CGAC 166).
    humanURL: https://www.usaspending.gov/agency/african-development-foundation
    baseURL: https://api.usaspending.gov
    tags:
      - Grants
      - Awards
      - Spending
      - Transparency
      - Federal Awards
    properties:
      - type: Documentation
        url: https://api.usaspending.gov/docs/endpoints
      - type: OpenAPI
        url: openapi/usadf-grants-api-openapi.yml
      - type: JSONSchema
        url: json-schema/grants-api-award-schema.json
      - type: JSONSchema
        url: json-schema/grants-api-recipient-schema.json
  - aid: us-african-development-foundation:grant-opportunities-api
    name: USADF Grant Opportunities API
    description: >-
      Access to USADF grant opportunity listings through the Grants.gov API.
      USADF posts open grant solicitations on Grants.gov for African grassroots
      enterprises, cooperatives, and social entrepreneurs seeking funding.
      Grant amounts up to $250,000 for African-led development initiatives.
    humanURL: https://www.grants.gov/search-grants?agencyCode=ADF
    baseURL: https://apply07.grants.gov
    tags:
      - Grant Opportunities
      - Funding
      - Applications
      - Africa
    properties:
      - type: Documentation
        url: https://www.grants.gov/developers.html
      - type: OpenAPI
        url: openapi/usadf-grant-opportunities-api-openapi.yml
      - type: JSONSchema
        url: json-schema/grant-opportunities-api-opportunity-schema.json
